- name: Install dependencies
  apt:
    name: sshpass
    update_cache: true

- name: Check if SSH key exists
  stat:
    path: "/root/.ssh/id_ed25519"
  register: ssh_key

- name: Generate SSH key for Restic
  command: >
    ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N "" -C "restic-backup"
  when: not ssh_key.stat.exists

- name: Add Storage Box host key
  known_hosts:
    name: "[{{ storage_box_hostname }}]:23"
    key: "{{ lookup('pipe', 'ssh-keyscan -p 23 ' ~ storage_box_hostname) }}"
    path: /root/.ssh/known_hosts

- name: Copy SSH key to storage box
  command: >
    sshpass -p "{{ storage_box_password }}"
    ssh-copy-id -o StrictHostKeyChecking=no -s
    -i /root/.ssh/id_ed25519.pub
    -p 23
    {{ storage_box_user }}@{{ storage_box_hostname }}