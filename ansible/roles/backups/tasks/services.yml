  - name: Copy backup script
    template:
      src: backup.sh.j2
      dest: /opt/backup.sh
      mode: '0755'

  - name: Copy backup service
    copy:
      src: backup.service
      dest: /etc/systemd/system/backup.service
      mode: '0644'
    notify: Reload systemd

  - name: Copy backup timer
    copy:
      src: backup.timer
      dest: /etc/systemd/system/backup.timer
      mode: '0644'
    notify: Reload systemd

  - name: Enable and start timer
    systemd:
      name: backup.timer
      enabled: true
      state: started
